    <section class="section" id="methodology" aria-label="Testing methodology">
        <div class="container">
            <div class="section-header reveal">
                <span class="section-label">Methodology</span>
                <h2>Our Rigorous Testing Protocol</h2>
                <p>All products undergo standardized analytical procedures in controlled laboratory conditions to ensure reproducible, statistically valid results.</p>
            </div>

            <div class="methodology-grid">
                <div class="method-card reveal">
                    <div class="method-number">01</div>
                    <h4>Dynamic Light Scattering (DLS)</h4>
                    <p>Particle size distribution analysis using Malvern Zetasizer Nano ZS. Samples are diluted in deionized water and measured at 25°C with a scattering angle of 173°. Mean hydrodynamic diameter (Z-average) and polydispersity index (PDI) are recorded in triplicate.</p>
                </div>
                <div class="method-card reveal">
                    <div class="method-number">02</div>
                    <h4>High-Performance Liquid Chromatography (HPLC)</h4>
                    <p>Cannabinoid potency quantification via Agilent 1260 Infinity II HPLC with diode array detection. Separation achieved on C18 column (250 x 4.6mm, 5um) with gradient elution. CBD concentration verified against certified reference standards.</p>
                </div>
                <div class="method-card reveal">
                    <div class="method-number">03</div>
                    <h4>Transmission Electron Microscopy (TEM)</h4>
                    <p>Morphological characterization using JEOL JEM-2100 TEM at 200kV. Samples are negatively stained with 2% uranyl acetate. Digital images analyzed using ImageJ for particle counting and aspect ratio determination.</p>
                </div>
                <div class="method-card reveal">
                    <div class="method-number">04</div>
                    <h4>Stability &amp; Zeta Potential Analysis</h4>
                    <p>Colloidal stability assessed through zeta potential measurements (Malvern Zetasizer) and accelerated aging protocols (40°C/75% RH for 90 days). Shelf-life kinetic modeling applied to predict formulation stability over 24 months.</p>
                </div>
                <div class="method-card reveal">
                    <div class="method-number">05</div>
                    <h4>In Vitro Dissolution Testing</h4>
                    <p>Simulated gastric and intestinal fluid dissolution profiles generated using USP Type II paddle apparatus at 37°C ± 0.5°C. Samples collected at 15, 30, 60, 90, and 120 minutes for HPLC analysis of released cannabinoid concentration.</p>
                </div>
                <div class="method-card reveal">
                    <div class="method-number">06</div>
                    <h4>Contaminant Screening</h4>
                    <p>Full Certificate of Analysis (COA) verification including heavy metals (ICP-MS), pesticide residues (GC-MS/MS), residual solvents (HS-GC-MS), microbial content (USP&lt;61&gt;/&lt;62&gt;), and mycotoxins (LC-MS/MS) per ISO 17025 standards.</p>
                </div>
            </div>
        </div>
    </section>

    <section class="section section-alt" id="faq" aria-label="Frequently asked scientific questions">
        <div class="container">
            <div class="section-header reveal">
                <span class="section-label">Scientific FAQ</span>
                <h2>Frequently Asked Questions: Nano CBD Science</h2>
                <p>Evidence-based answers to common questions about proprietary nano fragmentation technology, bioavailability, particle sizing, and analytical methodology.</p>
            </div>

            <div style="display: flex; flex-direction: column; gap: 20px; max-width: 900px; margin: 0 auto;">
                <article class="reveal" style="background: var(--c-white); border: 1px solid var(--c-silver-light); border-radius: var(--radius-lg); padding: 28px; box-shadow: var(--shadow-sm);" itemscope itemtype="https://schema.org/Question">
                    <h3 style="font-size: 1.1rem; margin-bottom: 12px; color: var(--c-dark);" itemprop="name">What is proprietary nano fragmentation technology and how does it improve CBD absorption?</h3>
                    <div itemscope itemprop="acceptedAnswer" itemtype="https://schema.org/Answer">
                        <p style="font-size: 0.92rem; color: var(--c-text-muted); margin-bottom: 0;" itemprop="text">Proprietary nano fragmentation technology is a proprietary process that reduces CBD molecular clusters from approximately 2,000 nanometers to under 100 nanometers — typically 20-60nm for pharmaceutical-grade products. At this scale, three critical improvements occur: <strong>(1) Water compatibility:</strong> nano-sized droplets can remain stably dispersed in aqueous solutions rather than separating, enabling absorption through mucous membranes; <strong>(2) Dramatically increased surface-area-to-volume ratio:</strong> more CBD molecules are exposed to absorption surfaces simultaneously; <strong>(3) Bypass of first-pass metabolism:</strong> nano CBD absorbed sublingually enters circulation directly rather than being processed by hepatic enzymes in the liver. Published pharmacokinetic studies demonstrate proprietary nano CBD achieves C<sub>max</sub> (peak blood concentration) values 4-6x higher than conventional oil formulations at equivalent doses.</p>
                    </div>
                </article>

                <article class="reveal" style="background: var(--c-white); border: 1px solid var(--c-silver-light); border-radius: var(--radius-lg); padding: 28px; box-shadow: var(--shadow-sm);" itemscope itemtype="https://schema.org/Question">
                    <h3 style="font-size: 1.1rem; margin-bottom: 12px; color: var(--c-dark);" itemprop="name">What is the optimal particle size for nano CBD?</h3>
                    <div itemscope itemprop="acceptedAnswer" itemtype="https://schema.org/Answer">
                        <p style="font-size: 0.92rem; color: var(--c-text-muted); margin-bottom: 0;" itemprop="text">Research indicates the optimal therapeutic window for nano CBD particles is between 20-80 nanometers. Particles below 20nm may clear too rapidly from circulation, while particles above 100nm lose the water-solubility advantages that define nano-emulsion efficacy. Arkos Bioscience's sub-60nm particle size places it firmly in the optimal range. Particle size distribution (polydispersity index, or PDI) is also critical — a PDI below 0.2 indicates a uniform particle population, which correlates with consistent dosing and predictable pharmacokinetics. Products without published particle size data should be viewed with skepticism, as this is a fundamental quality metric for nano CBD.</p>
                    </div>
                </article>

                <article class="reveal" style="background: var(--c-white); border: 1px solid var(--c-silver-light); border-radius: var(--radius-lg); padding: 28px; box-shadow: var(--shadow-sm);" itemscope itemtype="https://schema.org/Question">
                    <h3 style="font-size: 1.1rem; margin-bottom: 12px; color: var(--c-dark);" itemprop="name">How is CBD bioavailability measured scientifically?</h3>
                    <div itemscope itemprop="acceptedAnswer" itemtype="https://schema.org/Answer">
                        <p style="font-size: 0.92rem; color: var(--c-text-muted); margin-bottom: 0;" itemprop="text">Bioavailability is determined through pharmacokinetic studies measuring the area under the curve (AUC) of CBD plasma concentration over time after administration. The gold standard method involves: <strong>(1)</strong> Administering a controlled dose to human subjects, <strong>(2)</strong> Collecting blood samples at timed intervals (0, 15, 30, 60, 90, 120, 240 minutes), <strong>(3)</strong> Quantifying plasma CBD concentration via LC-MS/MS (liquid chromatography-tandem mass spectrometry), <strong>(4)</strong> Calculating AUC and comparing against an intravenous reference dose. For consumer products without clinical trials, bioavailability is estimated through in vitro dissolution testing (simulated gastric and intestinal fluid models), ex vivo permeability assays (Caco-2 cell monolayers), and comparative particle size analysis against products with published pharmacokinetic data.</p>
                    </div>
                </article>

                <article class="reveal" style="background: var(--c-white); border: 1px solid var(--c-silver-light); border-radius: var(--radius-lg); padding: 28px; box-shadow: var(--shadow-sm);" itemscope itemtype="https://schema.org/Question">
                    <h3 style="font-size: 1.1rem; margin-bottom: 12px; color: var(--c-dark);" itemprop="name">What is first-pass metabolism and why does it reduce CBD effectiveness?</h3>
                    <div itemscope itemprop="acceptedAnswer" itemtype="https://schema.org/Answer">
                        <p style="font-size: 0.92rem; color: var(--c-text-muted); margin-bottom: 0;" itemprop="text">First-pass metabolism (also called first-pass hepatic metabolism) is the process by which orally-administered substances are processed by the liver before entering systemic circulation. When you swallow CBD oil, it travels through the gastrointestinal tract into the portal vein, which delivers it directly to the liver. Hepatic enzymes — primarily CYP3A4 and CYP2C19 — metabolize approximately 80-95% of the CBD into inactive compounds before it ever reaches your bloodstream. This is why traditional oral CBD oil has only 4-8% bioavailability. Sublingual administration (holding under the tongue) partially bypasses first-pass metabolism by allowing absorption through sublingual capillaries into the jugular vein. Nano CBD maximizes this bypass effect by creating particles small enough to permeate mucous membranes efficiently.</p>
                    </div>
                </article>

                <article class="reveal" style="background: var(--c-white); border: 1px solid var(--c-silver-light); border-radius: var(--radius-lg); padding: 28px; box-shadow: var(--shadow-sm);" itemscope itemtype="https://schema.org/Question">
                    <h3 style="font-size: 1.1rem; margin-bottom: 12px; color: var(--c-dark);" itemprop="name">What analytical methods are used to verify nano CBD quality?</h3>
                    <div itemscope itemprop="acceptedAnswer" itemtype="https://schema.org/Answer">
                        <p style="font-size: 0.92rem; color: var(--c-text-muted); margin-bottom: 0;" itemprop="text">Five key analytical techniques: <strong>(1) Dynamic Light Scattering (DLS)</strong> — measures particle size distribution and polydispersity index; <strong>(2) High-Performance Liquid Chromatography (HPLC)</strong> — quantifies CBD concentration and detects cannabinoid profile; <strong>(3) Liquid Chromatography-Mass Spectrometry (LC-MS/MS)</strong> — provides definitive compound identification at trace levels; <strong>(4) Inductively Coupled Plasma Mass Spectrometry (ICP-MS)</strong> — screens for heavy metal contaminants (lead, arsenic, mercury, cadmium); and <strong>(5) Gas Chromatography-Mass Spectrometry (GC-MS)</strong> — detects residual solvents and pesticides. A comprehensive Certificate of Analysis should include results from at least DLS, HPLC, and ICP-MS analysis. Products lacking published analytical data cannot be objectively evaluated for quality or safety.</p>
                    </div>
                </article>
            </div>
        </div>

    <script>
        // ============================================
        // SCROLL REVEAL ANIMATIONS
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            const revealElements = document.querySelectorAll('.reveal');

            const revealObserver = new IntersectionObserver((entries) => {
                entries.forEach((entry, index) => {
                    if (entry.isIntersecting) {
                        setTimeout(() => {
                            entry.target.classList.add('visible');
                        }, index * 80);
                        revealObserver.unobserve(entry.target);
                    }
                });
            }, {
                threshold: 0.1,
                rootMargin: '0px 0px -40px 0px'
            });

            revealElements.forEach(el => revealObserver.observe(el));

            // ============================================
            // BAR CHART ANIMATION
            // ============================================
            const barFills = document.querySelectorAll('.bar-fill');
            const barObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        setTimeout(() => {
                            entry.target.classList.add('animated');
                        }, 200);
                        barObserver.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.5 });

            barFills.forEach(bar => barObserver.observe(bar));

            // ============================================
            // SCORE BAR ANIMATION (Comparison Table)
            // ============================================
            const scoreBars = document.querySelectorAll('.score-bar-fill');
            const scoreObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const targetWidth = entry.target.getAttribute('data-width');
                        setTimeout(() => {
                            entry.target.style.width = targetWidth;
                        }, 300);
                        scoreObserver.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.5 });

            scoreBars.forEach(bar => {
                bar.style.width = '0%';
                scoreObserver.observe(bar);
            });

            // ============================================
            // SMOOTH SCROLL FOR NAV LINKS
            // ============================================
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function(e) {
                    e.preventDefault();
                    const target = document.querySelector(this.getAttribute('href'));
                    if (target) {
                        const headerOffset = 80;
                        const elementPosition = target.getBoundingClientRect().top;
                        const offsetPosition = elementPosition + window.pageYOffset - headerOffset;

                        window.scrollTo({
                            top: offsetPosition,
                            behavior: 'smooth'
                        });

                        // Update active nav link
                        document.querySelectorAll('.main-nav a').forEach(link => link.classList.remove('active'));
                        const navLink = document.querySelector(`.main-nav a[href="${this.getAttribute('href')}"]`);
                        if (navLink) navLink.classList.add('active');
                    }
                });
            });

            // ============================================
            // ACTIVE NAV TRACKING ON SCROLL
            // ============================================
            const sections = document.querySelectorAll('section[id]');
            const navLinks = document.querySelectorAll('.main-nav a');

            window.addEventListener('scroll', () => {
                let current = '';
                sections.forEach(section => {
                    const sectionTop = section.offsetTop - 100;
                    if (window.pageYOffset >= sectionTop) {
                        current = section.getAttribute('id');
                    }
                });

                navLinks.forEach(link => {
                    link.classList.remove('active');
                    if (link.getAttribute('href') === '#' + current) {
                        link.classList.add('active');
                    }
                });
            });

            // ============================================
            // MOBILE MENU TOGGLE
            // ============================================
            const mobileBtn = document.querySelector('.mobile-menu-btn');
            const mainNav = document.querySelector('.main-nav');

            if (mobileBtn && mainNav) {
                mobileBtn.addEventListener('click', () => {
                    mainNav.style.display = mainNav.style.display === 'block' ? 'none' : 'block';
                    mobileBtn.setAttribute('aria-expanded', mainNav.style.display === 'block');
                });
            }
        });
    </script>
