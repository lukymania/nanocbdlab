        }

        .winner-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            background: rgba(16,185,129,0.1);
            color: var(--c-success);
            font-size: 0.7rem;
            font-weight: 700;
            border-radius: var(--radius-sm);
            margin-left: 8px;
        }

        /* ============================================
           PARTICLE SIZE VISUAL COMPARISON
           ============================================ */
        .particle-comparison {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 80px;
            padding: 40px 0;
            flex-wrap: wrap;
        }

        .particle-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .particle-illustration {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .particle-traditional {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #e0e0e0, #b0b0b0);
            box-shadow:
                inset -10px -10px 20px rgba(0,0,0,0.15),
                inset 10px 10px 20px rgba(255,255,255,0.5),
                0 4px 20px rgba(0,0,0,0.1);
            position: relative;
        }

        .particle-traditional::after {
            content: '~2,000nm';
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-family: var(--font-body);
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--c-text-muted);
            white-space: nowrap;
        }

        .particle-nano-group {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .particle-nano {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #00B4D8, #0077B6);
            box-shadow:
                inset -3px -3px 6px rgba(0,0,0,0.2),
                inset 3px 3px 6px rgba(255,255,255,0.3),
                0 2px 8px rgba(0,119,182,0.3);
        }

        .particle-nano-label {
            text-align: center;
            margin-top: 30px;
        }

        .particle-nano-label .size {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--c-blue);
        }

        .particle-nano-label .desc {
            font-size: 0.75rem;
            color: var(--c-text-muted);
        }

        .particle-vs {
            font-family: var(--font-display);
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--c-silver);
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        /* ============================================
           BIOAVAILABILITY BAR CHART
           ============================================ */
        .chart-container {
            background: var(--c-white);
            border: 1px solid var(--c-silver-light);
            border-radius: var(--radius-lg);
            padding: 40px;
            box-shadow: var(--shadow-md);
        }

        .bar-chart {
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .bar-row {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .bar-label {
            min-width: 180px;
            text-align: right;
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--c-dark);
        }

        .bar-track {
            flex: 1;
            height: 36px;
            background: var(--c-offwhite);
            border-radius: var(--radius-md);
            overflow: hidden;
            position: relative;
        }

        .bar-fill {
            height: 100%;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 14px;
            transition: width 1.5s ease-out;
            position: relative;
        }

        .bar-fill.traditional {
            background: linear-gradient(90deg, #9CA3AF, #D1D5DB);
            width: 0;
        }

        .bar-fill.sublingual {
            background: linear-gradient(90deg, var(--c-warning), #FCD34D);
            width: 0;
        }

        .bar-fill.nano {
            background: linear-gradient(90deg, var(--c-blue), var(--c-blue-light));
            width: 0;
        }

        .bar-fill.animated { width: var(--target-width); }

        .bar-fill span {
            font-family: var(--font-display);
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--c-white);
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .bar-fill.traditional span { color: var(--c-dark); }

        .bar-value-inline {
            min-width: 60px;
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--c-dark);
        }

        .chart-legend {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--c-silver-light);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.82rem;
            color: var(--c-text-muted);
        }

        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 3px;
        }

        /* ============================================
           METHODOLOGY SECTION
           ============================================ */
        .methodology-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 28px;
        }

        .method-card {
            background: var(--c-white);
            border: 1px solid var(--c-silver-light);
            border-radius: var(--radius-lg);
            padding: 28px;
            box-shadow: var(--shadow-sm);
        }

        .method-card .method-number {
            font-family: var(--font-display);
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--c-blue-pale);
            line-height: 1;
            margin-bottom: 12px;
        }

        .method-card h4 {
            margin-bottom: 8px;
        }

        .method-card p {
            font-size: 0.88rem;
            color: var(--c-text-muted);
            margin-bottom: 0;
        }

        /* ============================================
           LAB TESTING / COA SECTION
           ============================================ */
        .coa-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 48px;
            align-items: start;
        }

        .coa-diagram {
            background: var(--c-white);
            border: 1px solid var(--c-silver-light);
            border-radius: var(--radius-lg);
            padding: 32px;
            box-shadow: var(--shadow-md);
        }

        .coa-checklist {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .coa-check-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 14px 18px;
            background: var(--c-white);
            border: 1px solid var(--c-silver-light);
            border-radius: var(--radius-md);
            transition: all 0.2s ease;
        }

        .coa-check-item:hover {
            border-color: var(--c-blue);
            box-shadow: var(--shadow-sm);
        }

        .coa-check-icon {
            width: 24px;
            height: 24px;
            min-width: 24px;
            border-radius: 50%;
            background: rgba(16,185,129,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--c-success);
            font-size: 0.75rem;
            font-weight: 700;
            margin-top: 2px;
        }

        .coa-check-text {
            font-size: 0.88rem;
        }

        .coa-check-text strong {
            color: var(--c-dark);
            display: block;
            margin-bottom: 2px;
        }

        .coa-check-text span {
            color: var(--c-text-muted);
            font-size: 0.82rem;
        }

        /* ============================================
           CITATIONS / BIBLIOGRAPHY
           ============================================ */
        .citation-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .citation-item {
            display: flex;
            gap: 16px;
            padding: 20px 24px;
            background: var(--c-white);
            border: 1px solid var(--c-silver-light);
            border-radius: var(--radius-md);
            transition: all 0.2s ease;
        }

        .citation-item:hover {
            border-color: var(--c-blue);
            box-shadow: var(--shadow-sm);
        }

        .citation-number {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--c-blue);
            min-width: 36px;
        }

        .citation-content {
            flex: 1;
        }

        .citation-content p {
            font-size: 0.9rem;
            color: var(--c-dark);
            margin-bottom: 4px;
        }

        .citation-meta {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .citation-meta span {
            font-size: 0.78rem;
            color: var(--c-text-muted);
        }

        .citation-meta .journal {
            color: var(--c-blue);
            font-weight: 600;
        }

        .citation-meta .year {
            background: var(--c-offwhite);
            padding: 2px 8px;
            border-radius: var(--radius-sm);
        }
